services:
  - type: web
    name: agon-backend
    runtime: node
    region: oregon # or any region you prefer
    plan: free # free tier
    branch: main
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: agon-db
          property: connectionString
      - key: PORT
        value: 4000
      # Add these from Render dashboard or here as secrets:
      # - key: JWT_SECRET
      #   sync: false
      # - key: STRAVA_CLIENT_ID
      #   sync: false
      # - key: STRAVA_CLIENT_SECRET
      #   sync: false
      # - key: FRONTEND_URL
      #   value: https://your-frontend-url.com
      # - key: GOOGLE_AI_API_KEY
      #   sync: false

databases:
  - name: agon-db
    databaseName: agon
    plan: free # free tier PostgreSQL
    region: oregon
