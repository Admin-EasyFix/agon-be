name: PR Agent (Gemini)
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]  # Added 'synchronize' for updates
  issue_comment:  # For manual commands like /review
    types: [created]
jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}  # Skip bot-triggered events
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      - name: PR Agent action step
        uses: Codium-ai/pr-agent@main  # Official action name (not qodo-ai)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_GEMINI_API_KEY }}  # For Gemini via LiteLLM
          # Model config (use LiteLLM format for Gemini)
          OPENAI_API_BASE: "https://api.google.com/v1"  # Proxy base for Gemini
          OPENAI_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_GEMINI_API_KEY}}  # Map to OpenAI-compatible
          # Auto-run settings (as env vars; these override defaults)
          GITHUB_ACTION_CONFIG_AUTO_REVIEW: "true"
          GITHUB_ACTION_CONFIG_AUTO_DESCRIBE: "true"
          GITHUB_ACTION_CONFIG_AUTO_IMPROVE: "true"
          # Debug logging
          LOG_LEVEL: "DEBUG"  # Add for verbose output in logs