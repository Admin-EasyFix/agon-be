name: PR Agent (Gemini)
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]  # Added 'synchronize' to run on PR updates
  issue_comment:
    types: [created]  # For manual commands like /review
jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      - name: PR Agent action step
        uses: qodo-ai/pr-agent@main  # Updated to official Qodo repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_GEMINI_API_KEY }}  # Direct Gemini var (no OpenAI mapping)
          config.model: "gemini/gemini-1.5-flash"  # Or "gemini/gemini-2.0-flash" if available
          config.fallback_models: '["gemini/gemini-1.5-flash"]'
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          LOG_LEVEL: "DEBUG"  # Keep for troubleshooting