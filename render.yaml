services:
  - type: web
    name: agon-backend
    runtime: node
    region: oregon # or any region you prefer
    plan: free # free tier
    branch: main
    rootDir: backend
    buildCommand: npm install && npm ci && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: agon-db
          property: connectionString
      - key: PORT
        value: 4000

databases:
  - name: agon-db
    databaseName: agon
    plan: free # free tier PostgreSQL
    region: oregon
